<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1">

<meta name="robots"
content="noindex,nofollow">

<title>変態どもめ!!</title>

<style>

body{
  margin:0;
  background:#111;
}

img{
  width:100%;
  display:block;
}

</style>
</head>

<body>

<script>

async function loadImages(){

  for(let i=1;i<=300;i++){

    const num =
      String(i).padStart(3,"0");

    const url =
      `${num}.webp`;

    const img =
      document.createElement("img");

    img.src = url;

    img.loading = "lazy";

    img.onerror = () => {
      img.remove();
    };

    document.body.appendChild(img);

  }

}

loadImages();

</script>

</body>
</html>
